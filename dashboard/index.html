<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | HCHC Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ivory: #F5F0EB;
  --navy: #1B2A4A;
  --espresso: #3C2A21;
  --sand: #D4C5B2;
  --mocha: #A37762;
  --carrara: #E8E4E0;
  --gold: #C4A265;
  --dusty-blue: #7B9BAE;
  --sage: #8A9A7B;
  --heading: 'Cormorant Garamond', Georgia, serif;
  --body: 'Jost', 'Segoe UI', sans-serif;
}

body {
  font-family: var(--body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.6;
  color: var(--espresso);
  background: var(--ivory);
}

/* --- Top Bar --- */
.topbar {
  background: var(--navy);
  color: var(--ivory);
  padding: 14px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar-logo {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1.15rem;
  color: var(--ivory);
  text-decoration: none;
}

.topbar-logo span {
  font-family: var(--body);
  font-weight: 200;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dusty-blue);
  display: block;
  margin-top: -2px;
}

.topbar-right {
  display: flex;
  gap: 20px;
  align-items: center;
}

.topbar-nav a {
  color: var(--sand);
  font-size: 0.75rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.2s;
}

.topbar-nav a:hover { color: var(--ivory); }

.topbar-user {
  font-size: 0.8rem;
  color: var(--dusty-blue);
}

.topbar-signout {
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--sand);
  font-family: var(--body);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.topbar-signout:hover { border-color: var(--ivory); color: var(--ivory); }

/* --- Dashboard Layout --- */
.dashboard {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 32px;
}

.dashboard-header {
  margin-bottom: 40px;
}

.dashboard-header h1 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 2rem;
  color: var(--navy);
  margin-bottom: 4px;
}

.dashboard-header p {
  font-size: 0.9rem;
  color: var(--mocha);
}

.role-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 12px;
  background: var(--navy);
  color: var(--ivory);
  margin-top: 8px;
}

/* --- Quick Actions --- */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}

.action-card {
  background: #fff;
  border: 1px solid var(--sand);
  padding: 32px 28px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: block;
}

.action-card:hover {
  border-color: var(--navy);
  box-shadow: 0 4px 16px rgba(27, 42, 74, 0.08);
}

.action-icon {
  font-size: 1.6rem;
  margin-bottom: 16px;
  display: block;
}

.action-card h3 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1.2rem;
  color: var(--navy);
  margin-bottom: 8px;
}

.action-card p {
  font-size: 0.85rem;
  color: var(--espresso);
  line-height: 1.5;
}

/* --- Projects Section --- */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.section-header h2 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1.4rem;
  color: var(--navy);
}

.btn {
  font-family: var(--body);
  font-weight: 300;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 22px;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
  display: inline-block;
}

.btn-primary { background: var(--navy); color: var(--ivory); }
.btn-primary:hover { background: var(--mocha); }

.btn-outline {
  background: none;
  border: 1px solid var(--sand);
  color: var(--espresso);
}

.btn-outline:hover { border-color: var(--navy); }

/* Projects table */
.projects-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
}

.projects-table th {
  text-align: left;
  font-size: 0.68rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mocha);
  padding: 12px 16px;
  border-bottom: 1px solid var(--sand);
}

.projects-table td {
  padding: 14px 16px;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--carrara);
  vertical-align: middle;
}

.projects-table tr:hover td { background: rgba(245, 240, 235, 0.5); }

.status-pill {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 2px;
}

.status-submitted { background: #E3F2FD; color: #1565C0; }
.status-in-review { background: #FFF3E0; color: #E65100; }
.status-complete { background: #E8F5E9; color: #2E7D32; }

.empty-projects {
  text-align: center;
  padding: 60px 24px;
  background: #fff;
  border: 1px solid var(--sand);
}

.empty-projects h3 {
  font-family: var(--heading);
  font-size: 1.2rem;
  color: var(--mocha);
  margin-bottom: 8px;
}

.empty-projects p {
  font-size: 0.85rem;
  color: var(--sand);
  margin-bottom: 20px;
}

/* Admin review queue */
.review-card {
  background: #fff;
  border: 1px solid var(--sand);
  padding: 20px 24px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.review-info h4 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1rem;
  color: var(--navy);
}

.review-meta {
  font-size: 0.8rem;
  color: var(--mocha);
}

.review-actions { display: flex; gap: 8px; }

/* --- Loading --- */
.loading-state {
  text-align: center;
  padding: 80px;
  color: var(--mocha);
}

/* --- Not authenticated --- */
.auth-required {
  text-align: center;
  padding: 120px 24px;
}

.auth-required h2 {
  font-family: var(--heading);
  font-size: 1.8rem;
  color: var(--navy);
  margin-bottom: 12px;
}

.auth-required p {
  font-size: 0.92rem;
  color: var(--mocha);
  margin-bottom: 32px;
}

/* --- Responsive --- */
@media (max-width: 768px) {
  .dashboard { padding: 24px 20px; }
  .quick-actions { grid-template-columns: 1fr; }
  .projects-table { font-size: 0.82rem; }
  .projects-table th, .projects-table td { padding: 10px 12px; }
  .topbar { padding: 12px 20px; }
  .topbar-right { gap: 12px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a href="/" class="topbar-logo">
    Hill Country Home Concepts
    <span>Dashboard</span>
  </a>
  <div class="topbar-right">
    <div class="topbar-nav">
      <a href="/presentation-engine.html">Presentations</a>
      <a href="/materials.html">Materials</a>
      <a href="/">Home</a>
    </div>
    <span class="topbar-user" id="user-display"></span>
    <button class="topbar-signout" id="signout-btn" onclick="signOut()" style="display:none;">Sign Out</button>
  </div>
</div>

<!-- Dashboard Content -->
<div class="dashboard" id="dashboard-content">
  <div class="loading-state" id="loading">Loading dashboard...</div>
</div>

<!-- Clerk SDK -->
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_cmFwaWQtbWFja2VyZWwtMjguY2xlcmsuYWNjb3VudHMuZGV2JA"
  src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"
></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/clerk-auth.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const clerk = await initClerk();

  if (!clerk || !clerk.user) {
    showAuthRequired();
    return;
  }

  const user = clerk.user;
  const role = user.publicMetadata?.role || user.unsafeMetadata?.role || 'home_purchaser';
  const name = user.firstName || user.emailAddresses?.[0]?.emailAddress?.split('@')[0] || 'User';

  document.getElementById('user-display').textContent = name;
  document.getElementById('signout-btn').style.display = 'block';

  renderDashboard(role, name);
});

function showAuthRequired() {
  document.getElementById('dashboard-content').innerHTML = `
    <div class="auth-required">
      <h2>Sign In Required</h2>
      <p>You need to sign in to access the dashboard.</p>
      <button class="btn btn-primary" onclick="openSignIn()">Sign In</button>
    </div>
  `;
}

function renderDashboard(role, name) {
  const isAdmin = role === 'admin' || role === 'designer';
  const isBuilder = role === 'builder';

  let html = `
    <div class="dashboard-header">
      <h1>Welcome, ${name}</h1>
      <p>Manage your projects, materials, and presentations.</p>
      <span class="role-badge">${formatRole(role)}</span>
    </div>

    <div class="quick-actions">
      ${isAdmin || role === 'designer' ? `
        <a href="/presentation-engine.html" class="action-card">
          <span class="action-icon">&#9678;</span>
          <h3>Build Presentation</h3>
          <p>Create a client-ready design presentation with curated materials and style recommendations.</p>
        </a>
        <a href="/materials.html" class="action-card">
          <span class="action-icon">&#9670;</span>
          <h3>Material Library</h3>
          <p>Browse, add, and manage your product library with images, specs, and pricing tiers.</p>
        </a>
      ` : ''}

      ${isBuilder ? `
        <a href="#submit-project" class="action-card" onclick="showSubmitForm()">
          <span class="action-icon">&#9998;</span>
          <h3>Submit a Project</h3>
          <p>Submit a new project for design consultation. Upload plans and describe desired finishes.</p>
        </a>
      ` : ''}

      ${isAdmin ? `
        <a href="#review" class="action-card" onclick="loadReviewQueue()">
          <span class="action-icon">&#9745;</span>
          <h3>Review Queue</h3>
          <p>Review submitted projects, approve presentations, and manage client deliverables.</p>
        </a>
      ` : ''}

      <a href="#projects" class="action-card">
        <span class="action-icon">&#9776;</span>
        <h3>${isAdmin ? 'All Projects' : 'My Projects'}</h3>
        <p>View project history, download completed presentations, and track submission status.</p>
      </a>
    </div>

    <!-- Projects List -->
    <div id="projects-section">
      <div class="section-header">
        <h2>${isAdmin ? 'All Projects' : 'Your Projects'}</h2>
      </div>
      <div id="projects-list">
        <div class="empty-projects">
          <h3>No Projects Yet</h3>
          <p>${isBuilder ? 'Submit your first project to get started.' : 'Projects will appear here as they are submitted.'}</p>
          ${isBuilder ? '<button class="btn btn-primary" onclick="showSubmitForm()">Submit Project</button>' : ''}
        </div>
      </div>
    </div>

    <!-- Submit Project Form (hidden by default) -->
    <div id="submit-form-section" style="display:none; margin-top:40px;">
      <div class="section-header">
        <h2>Submit New Project</h2>
      </div>
      <div style="background:#fff; border:1px solid var(--sand); padding:32px;">
        <form id="project-form" onsubmit="submitProject(event)">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
            <div class="form-group" style="display:flex; flex-direction:column;">
              <label style="font-size:0.72rem; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; color:var(--mocha); margin-bottom:4px;">Project Name *</label>
              <input type="text" id="proj-name" required style="font-family:var(--body); padding:10px 12px; border:1px solid var(--sand); font-size:0.88rem;" placeholder="e.g., Lot 42 - Fair Oaks Ranch">
            </div>
            <div class="form-group" style="display:flex; flex-direction:column;">
              <label style="font-size:0.72rem; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; color:var(--mocha); margin-bottom:4px;">Address / Lot</label>
              <input type="text" id="proj-address" style="font-family:var(--body); padding:10px 12px; border:1px solid var(--sand); font-size:0.88rem;" placeholder="e.g., 1842 Clover Pass, Boerne TX">
            </div>
          </div>
          <div class="form-group" style="display:flex; flex-direction:column; margin-bottom:16px;">
            <label style="font-size:0.72rem; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; color:var(--mocha); margin-bottom:4px;">Scope</label>
            <select id="proj-scope" style="font-family:var(--body); padding:10px 12px; border:1px solid var(--sand); font-size:0.88rem;">
              <option value="interior">Interior Only</option>
              <option value="exterior">Exterior Only</option>
              <option value="both" selected>Interior and Exterior</option>
            </select>
          </div>
          <div class="form-group" style="display:flex; flex-direction:column; margin-bottom:16px;">
            <label style="font-size:0.72rem; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; color:var(--mocha); margin-bottom:4px;">Describe Desired Finishes</label>
            <textarea id="proj-notes" rows="4" style="font-family:var(--body); padding:10px 12px; border:1px solid var(--sand); font-size:0.88rem; resize:vertical;" placeholder="Tell us about your vision, preferred styles, budget range, and any specific requirements."></textarea>
          </div>
          <p style="font-size:0.8rem; color:var(--mocha); margin-bottom:16px;">Typical turnaround: 72 hours / 3 business days.</p>
          <button type="submit" class="btn btn-primary" id="submit-proj-btn">Submit Project</button>
        </form>
      </div>
    </div>
  `;

  document.getElementById('dashboard-content').innerHTML = html;
  loadProjects();
}

async function loadProjects() {
  try {
    const userId = getUserId();
    const role = getUserRole();
    const projects = await getProjects(role === 'admin' ? null : userId);

    if (projects.length === 0) return;

    const listEl = document.getElementById('projects-list');
    listEl.innerHTML = `
      <table class="projects-table">
        <thead>
          <tr>
            <th>Project</th>
            <th>Address</th>
            <th>Status</th>
            <th>Submitted</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${projects.map(p => `
            <tr>
              <td style="font-weight:400; color:var(--navy);">${p.name}</td>
              <td>${p.address || '--'}</td>
              <td><span class="status-pill status-${p.status?.replace(' ', '-')}">${p.status}</span></td>
              <td>${new Date(p.created_at).toLocaleDateString()}</td>
              <td>
                ${p.presentation_url ? `<a href="${p.presentation_url}" target="_blank" class="btn btn-outline" style="padding:6px 12px; font-size:0.7rem;">View</a>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    console.error('Failed to load projects:', err);
  }
}

function showSubmitForm() {
  const section = document.getElementById('submit-form-section');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth' });
}

async function submitProject(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-proj-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    await createProject({
      user_id: getUserId(),
      name: document.getElementById('proj-name').value.trim(),
      address: document.getElementById('proj-address').value.trim() || null,
      notes: document.getElementById('proj-notes').value.trim() || null,
      status: 'submitted'
    });

    alert('Project submitted. We will review and respond within 72 hours.');
    document.getElementById('project-form').reset();
    document.getElementById('submit-form-section').style.display = 'none';
    await loadProjects();
  } catch (err) {
    alert('Error submitting project. Please try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Project';
  }
}

function formatRole(role) {
  const labels = {
    admin: 'Admin',
    designer: 'Interior Designer',
    builder: 'Builder',
    home_purchaser: 'Home Purchaser'
  };
  return labels[role] || role;
}

async function signOut() {
  const clerk = await initClerk();
  if (clerk) {
    await clerk.signOut();
    window.location.href = '/';
  }
}
</script>

</body>
</html>
