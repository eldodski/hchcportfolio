<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Library | HCHC Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:ital,wght@0,200;0,300;0,400;1,200&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ivory: #F5F0EB;
  --navy: #1B2A4A;
  --espresso: #3C2A21;
  --sand: #D4C5B2;
  --mocha: #A37762;
  --carrara: #E8E4E0;
  --gold: #C4A265;
  --dusty-blue: #7B9BAE;
  --sage: #8A9A7B;
  --heading: 'Cormorant Garamond', Georgia, serif;
  --body: 'Jost', 'Segoe UI', sans-serif;
}

body {
  font-family: var(--body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.6;
  color: var(--espresso);
  background: var(--ivory);
}

/* --- Top Bar --- */
.topbar {
  background: var(--navy);
  color: var(--ivory);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar-logo {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1.2rem;
  color: var(--ivory);
  text-decoration: none;
}

.topbar-logo span {
  font-family: var(--body);
  font-weight: 200;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dusty-blue);
  display: block;
  margin-top: -2px;
}

.topbar-nav {
  display: flex;
  gap: 24px;
  align-items: center;
}

.topbar-nav a {
  color: var(--sand);
  font-size: 0.8rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.2s;
}

.topbar-nav a:hover { color: var(--ivory); }

/* --- Main Layout --- */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px;
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}

.page-header h1 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 2rem;
  color: var(--navy);
}

/* --- Filters --- */
.filters {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-input,
.filter-select {
  font-family: var(--body);
  font-weight: 300;
  font-size: 0.85rem;
  padding: 10px 14px;
  border: 1px solid var(--sand);
  background: #fff;
  color: var(--espresso);
  outline: none;
  transition: border-color 0.2s;
}

.filter-input:focus,
.filter-select:focus { border-color: var(--navy); }

.filter-input { min-width: 220px; }

/* --- Material Grid --- */
.material-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.material-card {
  background: #fff;
  border: 1px solid var(--sand);
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: hidden;
}

.material-card:hover {
  border-color: var(--navy);
  box-shadow: 0 4px 16px rgba(27, 42, 74, 0.08);
}

.material-card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  background: var(--carrara);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--sand);
  font-size: 2rem;
}

.material-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.material-card-body {
  padding: 16px;
}

.material-card-body h3 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1.1rem;
  color: var(--navy);
  margin-bottom: 4px;
}

.material-card-vendor {
  font-size: 0.78rem;
  color: var(--mocha);
  margin-bottom: 6px;
}

.material-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.badge {
  font-size: 0.68rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 2px;
}

.badge-category { background: var(--navy); color: var(--ivory); }
.badge-low { background: #E8F5E9; color: #2E7D32; }
.badge-mid { background: #FFF3E0; color: #E65100; }
.badge-high { background: #FCE4EC; color: #C62828; }

/* --- Buttons --- */
.btn {
  font-family: var(--body);
  font-weight: 300;
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 12px 28px;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-primary { background: var(--navy); color: var(--ivory); }
.btn-primary:hover { background: var(--mocha); }

.btn-secondary { background: var(--carrara); color: var(--espresso); }
.btn-secondary:hover { background: var(--sand); }

.btn-danger { background: #C62828; color: #fff; }
.btn-danger:hover { background: #B71C1C; }

.btn-sm { padding: 8px 16px; font-size: 0.75rem; }

/* --- Modal --- */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(27, 42, 74, 0.5);
  z-index: 1000;
  justify-content: center;
  align-items: flex-start;
  padding: 60px 24px;
  overflow-y: auto;
}

.modal-backdrop.open { display: flex; }

.modal {
  background: #fff;
  width: 100%;
  max-width: 600px;
  padding: 40px;
  position: relative;
}

.modal h2 {
  font-family: var(--heading);
  font-weight: 600;
  font-size: 1.6rem;
  color: var(--navy);
  margin-bottom: 24px;
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  font-size: 1.4rem;
  color: var(--espresso);
  cursor: pointer;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 16px;
}

.form-group label {
  font-size: 0.72rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mocha);
  margin-bottom: 6px;
}

.form-group input,
.form-group select {
  font-family: var(--body);
  font-weight: 300;
  font-size: 0.9rem;
  padding: 10px 14px;
  border: 1px solid var(--sand);
  background: #fff;
  color: var(--espresso);
  outline: none;
}

.form-group input:focus,
.form-group select:focus { border-color: var(--navy); }

/* Image upload */
.image-upload {
  border: 2px dashed var(--sand);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
  position: relative;
}

.image-upload:hover { border-color: var(--navy); }

.image-upload.has-image {
  padding: 0;
  border-style: solid;
}

.image-upload img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
}

.image-upload input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.image-upload-text {
  color: var(--sand);
  font-size: 0.85rem;
}

.image-upload-text strong {
  color: var(--navy);
}

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  justify-content: flex-end;
}

/* --- Empty State --- */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--sand);
}

.empty-state h3 {
  font-family: var(--heading);
  font-size: 1.4rem;
  color: var(--mocha);
  margin-bottom: 8px;
}

/* --- Toast --- */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--navy);
  color: var(--ivory);
  padding: 14px 24px;
  font-size: 0.85rem;
  font-weight: 300;
  z-index: 2000;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: #C62828; }

/* --- Loading --- */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--mocha);
  font-size: 0.9rem;
}

/* --- Responsive --- */
@media (max-width: 768px) {
  .main { padding: 20px; }
  .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
  .filters { flex-direction: column; }
  .filter-input { min-width: 100%; }
  .material-grid { grid-template-columns: 1fr 1fr; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .modal { padding: 24px; }
}

@media (max-width: 480px) {
  .material-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a href="/" class="topbar-logo">
    Hill Country Home Concepts
    <span>Material Library</span>
  </a>
  <div class="topbar-nav">
    <a href="/presentation-engine.html">Presentations</a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/">Home</a>
  </div>
</div>

<!-- Main Content -->
<div class="main">
  <div class="page-header">
    <h1>Material Library</h1>
    <button class="btn btn-primary" onclick="openAddModal()">Add Material</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input type="text" class="filter-input" id="filter-search" placeholder="Search materials..." oninput="applyFilters()">
    <select class="filter-select" id="filter-category" onchange="applyFilters()">
      <option value="">All Categories</option>
      <option value="flooring">Flooring</option>
      <option value="cabinetry">Cabinetry</option>
      <option value="countertops">Countertops</option>
      <option value="backsplash">Backsplash</option>
      <option value="hardware">Hardware</option>
      <option value="paint">Paint</option>
    </select>
    <select class="filter-select" id="filter-vendor" onchange="onFilterVendorChange()">
      <option value="">All Vendors</option>
    </select>
    <select class="filter-select" id="filter-series" onchange="applyFilters()" disabled>
      <option value="">All Series</option>
    </select>
    <select class="filter-select" id="filter-price" onchange="applyFilters()">
      <option value="">All Price Tiers</option>
      <option value="low">Low</option>
      <option value="mid">Mid</option>
      <option value="high">High</option>
    </select>
  </div>

  <!-- Grid -->
  <div id="material-grid" class="material-grid">
    <div class="loading">Loading materials...</div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-backdrop" id="material-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modal-title">Add Material</h2>

    <form id="material-form" onsubmit="saveMaterial(event)">
      <input type="hidden" id="mat-id">

      <div class="form-group">
        <label>Material Image</label>
        <div class="image-upload" id="image-upload" onclick="document.getElementById('mat-image-file').click()">
          <input type="file" id="mat-image-file" accept="image/*" onchange="previewImage(event)">
          <div class="image-upload-text" id="image-upload-text">
            <strong>Click to upload</strong> or drag and drop<br>
            PNG, JPG, WebP up to 5MB
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="mat-name">Name *</label>
        <input type="text" id="mat-name" required placeholder="e.g., European White Oak Hardwood">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="mat-category">Category *</label>
          <select id="mat-category" required>
            <option value="">Select category</option>
            <option value="flooring">Flooring</option>
            <option value="cabinetry">Cabinetry</option>
            <option value="countertops">Countertops</option>
            <option value="backsplash">Backsplash</option>
            <option value="hardware">Hardware</option>
            <option value="paint">Paint</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mat-price">Price Tier</label>
          <select id="mat-price">
            <option value="">Select tier</option>
            <option value="low">Low</option>
            <option value="mid">Mid</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="form-row-3">
        <div class="form-group">
          <label for="mat-vendor">Vendor *</label>
          <input type="text" id="mat-vendor" required placeholder="e.g., Shaw">
        </div>
        <div class="form-group">
          <label for="mat-series">Series *</label>
          <input type="text" id="mat-series" required placeholder="e.g., Canyon Ridge">
        </div>
        <div class="form-group">
          <label for="mat-color">Color *</label>
          <input type="text" id="mat-color" required placeholder="e.g., Alabaster Oak">
        </div>
      </div>

      <div class="form-group">
        <label for="mat-sku">SKU</label>
        <input type="text" id="mat-sku" placeholder="Optional product code">
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-danger" id="delete-btn" style="display:none; margin-right:auto;" onclick="confirmDelete()">Delete</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="save-btn">Save Material</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/supabase-client.js"></script>

<script>
// State
let allMaterials = [];
let currentImageFile = null;
let currentImageUrl = null;
let isEditing = false;

// Init
document.addEventListener('DOMContentLoaded', async () => {
  await loadMaterials();
});

async function loadMaterials() {
  const grid = document.getElementById('material-grid');
  grid.innerHTML = '<div class="loading">Loading materials...</div>';

  try {
    allMaterials = await getMaterials();
    populateVendorFilter();
    renderGrid(allMaterials);
  } catch (err) {
    grid.innerHTML = '<div class="loading">Could not load materials. Check Supabase connection.</div>';
    console.error(err);
  }
}

function populateVendorFilter() {
  const vendorSelect = document.getElementById('filter-vendor');
  const vendors = new Set();
  allMaterials.forEach(m => { if (m.vendor) vendors.add(m.vendor); });
  const sorted = [...vendors].sort();

  vendorSelect.innerHTML = '<option value="">All Vendors</option>' +
    sorted.map(v => `<option value="${v}">${v}</option>`).join('');
}

function onFilterVendorChange() {
  const vendor = document.getElementById('filter-vendor').value;
  const seriesSelect = document.getElementById('filter-series');

  if (!vendor) {
    seriesSelect.innerHTML = '<option value="">All Series</option>';
    seriesSelect.disabled = true;
  } else {
    const seriesSet = new Set();
    allMaterials.filter(m => m.vendor === vendor).forEach(m => {
      if (m.series) seriesSet.add(m.series);
    });
    const sorted = [...seriesSet].sort();
    seriesSelect.innerHTML = '<option value="">All Series</option>' +
      sorted.map(s => `<option value="${s}">${s}</option>`).join('');
    seriesSelect.disabled = false;
  }

  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('filter-search').value.toLowerCase();
  const category = document.getElementById('filter-category').value;
  const vendor = document.getElementById('filter-vendor').value;
  const series = document.getElementById('filter-series').value;
  const price = document.getElementById('filter-price').value;

  let filtered = allMaterials;
  if (search) filtered = filtered.filter(m =>
    m.name.toLowerCase().includes(search) ||
    m.vendor?.toLowerCase().includes(search) ||
    m.series?.toLowerCase().includes(search) ||
    m.color?.toLowerCase().includes(search)
  );
  if (category) filtered = filtered.filter(m => m.category === category);
  if (vendor) filtered = filtered.filter(m => m.vendor === vendor);
  if (series) filtered = filtered.filter(m => m.series === series);
  if (price) filtered = filtered.filter(m => m.price_tier === price);

  renderGrid(filtered);
}

function renderGrid(materials) {
  const grid = document.getElementById('material-grid');

  if (materials.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1 / -1;">
        <h3>No Materials Found</h3>
        <p>Add your first material to get started.</p>
      </div>`;
    return;
  }

  grid.innerHTML = materials.map(m => `
    <div class="material-card" onclick="openEditModal('${m.id}')">
      <div class="material-card-img">
        ${m.image_url
          ? `<img src="${m.image_url}" alt="${m.name}">`
          : '<span>No Image</span>'}
      </div>
      <div class="material-card-body">
        <h3>${m.name}</h3>
        <div class="material-card-vendor">
          ${m.vendor || ''}${m.series ? ' &rsaquo; ' + m.series : ''}${m.color ? ' &rsaquo; ' + m.color : ''}
        </div>
        <div class="material-meta">
          <span class="badge badge-category">${m.category}</span>
          ${m.price_tier ? `<span class="badge badge-${m.price_tier}">${m.price_tier}</span>` : ''}
        </div>
        ${m.sku ? `<p style="font-size: 0.75rem; color: var(--sand); margin-top: 6px;">SKU: ${m.sku}</p>` : ''}
      </div>
    </div>
  `).join('');
}

// Modal
function openAddModal() {
  isEditing = false;
  document.getElementById('modal-title').textContent = 'Add Material';
  document.getElementById('material-form').reset();
  document.getElementById('mat-id').value = '';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('save-btn').textContent = 'Save Material';
  resetImageUpload();
  document.getElementById('material-modal').classList.add('open');
}

async function openEditModal(id) {
  isEditing = true;
  const mat = allMaterials.find(m => m.id === id);
  if (!mat) return;

  document.getElementById('modal-title').textContent = 'Edit Material';
  document.getElementById('mat-id').value = mat.id;
  document.getElementById('mat-name').value = mat.name;
  document.getElementById('mat-category').value = mat.category;
  document.getElementById('mat-price').value = mat.price_tier || '';
  document.getElementById('mat-vendor').value = mat.vendor || '';
  document.getElementById('mat-series').value = mat.series || '';
  document.getElementById('mat-color').value = mat.color || '';
  document.getElementById('mat-sku').value = mat.sku || '';
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('save-btn').textContent = 'Update Material';

  // Image
  if (mat.image_url) {
    currentImageUrl = mat.image_url;
    const upload = document.getElementById('image-upload');
    upload.classList.add('has-image');
    upload.innerHTML = `<img src="${mat.image_url}" alt="${mat.name}"><input type="file" id="mat-image-file" accept="image/*" onchange="previewImage(event)">`;
  } else {
    resetImageUpload();
  }

  document.getElementById('material-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('material-modal').classList.remove('open');
  currentImageFile = null;
}

function resetImageUpload() {
  currentImageFile = null;
  currentImageUrl = null;
  const upload = document.getElementById('image-upload');
  upload.classList.remove('has-image');
  upload.innerHTML = `
    <input type="file" id="mat-image-file" accept="image/*" onchange="previewImage(event)">
    <div class="image-upload-text" id="image-upload-text">
      <strong>Click to upload</strong> or drag and drop<br>
      PNG, JPG, WebP up to 5MB
    </div>`;
}

function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentImageFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const upload = document.getElementById('image-upload');
    upload.classList.add('has-image');
    const existingInput = upload.querySelector('input[type="file"]');
    upload.innerHTML = `<img src="${ev.target.result}" alt="Preview">`;
    upload.appendChild(existingInput);
  };
  reader.readAsDataURL(file);
}

// Save
async function saveMaterial(e) {
  e.preventDefault();
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    let imageUrl = currentImageUrl || null;

    if (currentImageFile) {
      imageUrl = await uploadMaterialImage(currentImageFile);
    }

    const data = {
      name: document.getElementById('mat-name').value.trim(),
      category: document.getElementById('mat-category').value,
      vendor: document.getElementById('mat-vendor').value.trim() || null,
      series: document.getElementById('mat-series').value.trim() || null,
      color: document.getElementById('mat-color').value.trim() || null,
      price_tier: document.getElementById('mat-price').value || null,
      sku: document.getElementById('mat-sku').value.trim() || null,
      image_url: imageUrl
    };

    const id = document.getElementById('mat-id').value;

    if (id) {
      await updateMaterial(id, data);
      showToast('Material updated');
    } else {
      await createMaterial(data);
      showToast('Material added');
    }

    closeModal();
    await loadMaterials();
  } catch (err) {
    showToast('Error saving material: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = isEditing ? 'Update Material' : 'Save Material';
  }
}

async function confirmDelete() {
  const id = document.getElementById('mat-id').value;
  if (!id) return;
  if (!confirm('Delete this material? This cannot be undone.')) return;

  try {
    const mat = allMaterials.find(m => m.id === id);
    if (mat?.image_url) await deleteMaterialImage(mat.image_url);
    await deleteMaterial(id);
    showToast('Material deleted');
    closeModal();
    await loadMaterials();
  } catch (err) {
    showToast('Error deleting: ' + err.message, true);
  }
}

// Toast
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}
</script>

</body>
</html>
